[settings]
install_before = "7d"

[env]
# dbt-core does not support Python 3.14+.
UV_PYTHON = "3.13"

[tools]
uv = "0.11"
"cargo:cargo-audit" = "0.22"
"cargo:cargo-llvm-cov" = "0.8"
"cargo:mdbook" = "0.5"
"cargo:mdbook-mermaid" = "0.17"
duckdb = "1.5.1"

[tasks.build]
description = "Build Python package with maturin (creates .venv, installs dependencies, builds nagi CLI)"
run = "uv sync --all-extras"

[tasks.rebuild]
description = "Rebuild PyO3 native module from scratch"
run = "uv sync --all-extras --reinstall-package nagi-cli"

[tasks.check-rust]
description = "Run fmt, clippy, and test for Rust"
run = """
cargo fmt --check
cargo clippy --features python --tests -- -D warnings
cargo test
"""

[tasks.check-python]
description = "Run ruff and ty on Python code"
depends = ["build"]
run = """
uv run ruff check python/
uv run ruff format --check python/
uv run ty check python/
uv run pytest python/tests/ -v -m "not integration and not scenario" -n auto
"""

[tasks.check-docs]
description = "Check documentation conventions"
run = "bash scripts/check_doc_rules.sh"

[tasks.check]
description = "Run all checks (Rust, Python, docs)"
depends = ["check-rust", "check-python", "check-docs"]

[tasks.coverage]
description = "Generate test coverage report (requires cargo-llvm-cov)"
run = "cargo llvm-cov --no-default-features"

[tasks.audit]
description = "Check dependencies for known vulnerabilities (requires cargo-audit)"
run = "cargo audit"

[tasks."test:dbt-setup"]
description = "Seed and compile dbt projects for integration tests"
run = """
cd python/tests/dbt_projects/ecommerce && uv run dbt seed --profiles-dir profiles && uv run dbt compile --profiles-dir profiles
cd python/tests/dbt_projects/analytics && uv run dbt seed --profiles-dir profiles && uv run dbt compile --profiles-dir profiles
"""

[tasks."test:integration"]
description = "Run integration tests"
depends = ["build", "test:dbt-setup"]
run = "uv run pytest python/tests/integration/ -v -m integration"

[tasks."test:scenario"]
description = "Run serve scenario tests"
depends = ["build"]
run = "uv run pytest python/tests/scenario/ -v -m scenario"

[tasks."docs:gen-schema"]
description = "Generate JSON Schema and update resource docs"
run = """
cargo run -p nagi-schema-gen
uv run python scripts/gen_schema_docs.py docs/schemas docs/en
uv run python scripts/gen_schema_docs.py docs/schemas docs/ja
"""

[tasks."docs:build"]
description = "Build documentation site (EN + JA)"
depends = ["docs:gen-schema"]
run = """
uv run mkdocs build -f mkdocs.yml --strict
uv run mkdocs build -f mkdocs.ja.yml --strict
"""

[tasks."docs:serve"]
description = "Serve English documentation site locally with live reload (port 8000)"
run = "uv run mkdocs serve -a localhost:8000 --livereload"

[tasks."docs:serve-ja"]
description = "Serve Japanese documentation site locally with live reload (port 8001)"
run = "uv run mkdocs serve -f mkdocs.ja.yml -a localhost:8001 --livereload"

name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - 'docs/**'
      - 'mkdocs.yml'
      - 'mkdocs.ja.yml'
  pull_request:
    branches: [main]
    paths-ignore:
      - 'docs/**'
      - 'mkdocs.yml'
      - 'mkdocs.ja.yml'

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  static-check-rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: ./.github/actions/setup-rust
        with:
          components: clippy, rustfmt
          cache-prefix: static-check-rust

      - name: Check formatting
        run: cargo fmt --check

      - name: Clippy
        run: cargo clippy --features python --tests -- -D warnings

      - name: Audit Rust dependencies
        if: github.event_name == 'pull_request'
        run: |
          command -v cargo-audit >/dev/null || cargo install cargo-audit
          RESULT=$(cargo audit --color never --ignore RUSTSEC-2023-0071 2>&1) || AUDIT_RC=$?
          AUDIT_RC=${AUDIT_RC:-0}
          # Minimize previous cargo audit comments
          gh api "repos/${{ github.repository }}/issues/${{ github.event.number }}/comments" \
            --jq '.[] | select(.body | startswith("## cargo audit")) | .node_id' \
            | while read -r node_id; do
              gh api graphql -f query="mutation { minimizeComment(input: {subjectId: \"$node_id\", classifier: OUTDATED}) { minimizedComment { isMinimized } } }" 2>/dev/null || true
            done
          if [ "$AUDIT_RC" -ne 0 ]; then
            gh pr comment ${{ github.event.number }} --body "$(cat <<EOF
          ## cargo audit
          \`\`\`
          $RESULT
          \`\`\`
          EOF
          )"
          fi
        env:
          GH_TOKEN: ${{ github.token }}

  static-check-python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: ./.github/actions/setup-rust
        with:
          cache-prefix: static-check-python

      - uses: ./.github/actions/setup-uv

      - name: Ruff check
        run: uvx ruff check python/

      - name: Ruff format
        run: uvx ruff format --check python/

      - name: Build
        run: uv sync --all-extras --no-dev --group lint

      - name: Audit .pth files
        run: |
          ALLOWED="_virtualenv.pth|distutils-precedence.pth|nagi_cli.pth"
          FOUND=0
          find .venv -name "*.pth" | grep -vE "$ALLOWED" | while read -r f; do
            if grep -q "^import" "$f"; then
              BASENAME=$(basename "$f")
              PKG=$(grep -rl "$BASENAME" .venv/lib/python*/site-packages/*.dist-info/RECORD 2>/dev/null \
                | head -1 | xargs -I{} dirname {} | xargs -I{} basename {} | sed 's/\.dist-info$//' || echo "unknown")
              echo "::error::Suspicious .pth file installed by $PKG: $f"
              grep "^import" "$f" | while read -r line; do
                echo "  $line"
              done
              FOUND=1
            fi
          done
          if [ "$FOUND" = "1" ]; then exit 1; fi

      - name: Audit Python dependencies
        if: github.event_name == 'pull_request'
        run: |
          uv export --frozen --no-emit-project > requirements.txt
          RESULT=$(uvx pip-audit -r requirements.txt --ignore-vuln CVE-2026-4539 2>&1) || AUDIT_RC=$?
          AUDIT_RC=${AUDIT_RC:-0}
          # Minimize previous pip-audit comments
          gh api "repos/${{ github.repository }}/issues/${{ github.event.number }}/comments" \
            --jq '.[] | select(.body | startswith("## pip-audit")) | .node_id' \
            | while read -r node_id; do
              gh api graphql -f query="mutation { minimizeComment(input: {subjectId: \"$node_id\", classifier: OUTDATED}) { minimizedComment { isMinimized } } }" 2>/dev/null || true
            done
          if [ "$AUDIT_RC" -ne 0 ]; then
            gh pr comment ${{ github.event.number }} --body "$(cat <<EOF
          ## pip-audit
          \`\`\`
          $RESULT
          \`\`\`
          EOF
          )"
          fi
        env:
          GH_TOKEN: ${{ github.token }}

  python-versions:
    runs-on: ubuntu-latest
    outputs:
      min: ${{ steps.parse.outputs.min }}
      latest: ${{ steps.parse.outputs.latest }}
      dbt: ${{ steps.parse.outputs.dbt }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: ./.github/actions/setup-uv

      - id: parse
        shell: bash
        run: |
          echo "min=$(grep 'requires-python' pyproject.toml | sed 's/.*>=\([0-9.]*\).*/\1/')" >> "$GITHUB_OUTPUT"
          echo "latest=$(uv python list | grep -E '^cpython-3\.' | grep -v 'freethreaded\|a[0-9]\|b[0-9]\|rc[0-9]' | head -1 | sed 's/cpython-\([0-9]*\.[0-9]*\)\..*/\1/')" >> "$GITHUB_OUTPUT"
          echo "dbt=$(grep '^UV_PYTHON' mise.toml | sed 's/.*= *"\(.*\)"/\1/')" >> "$GITHUB_OUTPUT"

  build-and-test-rust:
    needs: static-check-rust
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: ./.github/actions/setup-rust
        with:
          cache-prefix: build-and-test-rust

      - uses: ./.github/actions/setup-duckdb

      - name: Test
        run: cargo test

  unit-test-python:
    needs: [static-check-python, python-versions]
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python: ["${{ needs.python-versions.outputs.latest }}"]
        include:
          - os: ubuntu-latest
            python: "${{ needs.python-versions.outputs.min }}"
    runs-on: ${{ matrix.os }}
    env:
      UV_PYTHON: ${{ matrix.python }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: ./.github/actions/setup-rust
        with:
          cache-prefix: unit-test-python

      - uses: ./.github/actions/setup-uv

      - name: Build
        run: uv sync --all-extras --no-dev --group lint --group test

      - name: Type check
        run: uv run --no-dev --group lint ty check python/

      - name: Unit test
        run: uv run --no-dev --group test pytest python/tests/ -v -m "not integration and not scenario" -n auto

  integration-test-python:
    needs: [static-check-python, python-versions]
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    env:
      # dbt-core does not support Python 3.14+.
      UV_PYTHON: ${{ needs.python-versions.outputs.dbt }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: ./.github/actions/setup-rust
        with:
          cache-prefix: integration-test-python

      - uses: ./.github/actions/setup-duckdb

      - uses: ./.github/actions/setup-uv

      - name: Build
        run: uv sync --all-extras --no-dev --group test --group dbt

      - name: Integration test
        run: uv run --no-dev --group test --group dbt pytest python/tests/integration/ -v -m integration

      - name: Scenario test
        run: uv run --no-dev --group test --group dbt pytest python/tests/scenario/ -v -m scenario

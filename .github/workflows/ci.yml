name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check-rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 # v1
        with:
          toolchain: stable
          components: clippy, rustfmt

      - uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        with:
          path: |
            ~/.cargo/bin
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: check-rust-${{ hashFiles('**/Cargo.lock', 'crates/**/*.rs') }}
          restore-keys: check-rust-

      - uses: ./.github/actions/setup-duckdb

      - name: Check formatting
        run: cargo fmt --check

      - name: Clippy
        run: cargo clippy --features python --tests -- -D warnings

      - name: Audit Rust dependencies
        if: github.event_name == 'pull_request'
        run: |
          command -v cargo-audit >/dev/null || cargo install cargo-audit
          RESULT=$(cargo audit 2>&1 | sed 's/\x1b\[[0-9;]*m//g') && AUDIT_RC=0 || AUDIT_RC=$?
          # Minimize previous cargo audit comments
          gh api "repos/${{ github.repository }}/issues/${{ github.event.number }}/comments" \
            --jq '.[] | select(.body | startswith("## cargo audit")) | .id' \
            | xargs -I{} gh api -X PATCH "repos/${{ github.repository }}/issues/comments/{}" \
              -f body="## cargo audit (outdated)" 2>/dev/null || true
          if [ "$AUDIT_RC" -ne 0 ]; then
            gh pr comment ${{ github.event.number }} --body "$(cat <<EOF
          ## cargo audit
          \`\`\`
          $RESULT
          \`\`\`
          EOF
          )"
          fi
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Test
        run: cargo test

  check-python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 # v1
        with:
          toolchain: stable

      - uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: check-python-${{ hashFiles('**/Cargo.lock', 'crates/**/*.rs') }}
          restore-keys: check-python-

      - uses: ./.github/actions/setup-duckdb

      - name: Read uv version
        id: uv-version
        run: echo "version=$(grep '^uv = ' mise.toml | sed 's/.*= *"\(.*\)"/\1/')" >> "$GITHUB_OUTPUT"

      - uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57 # v8.0.0
        with:
          version: ${{ steps.uv-version.outputs.version }}

      - name: Ruff check
        run: uvx ruff check python/

      - name: Ruff format
        run: uvx ruff format --check python/

      - name: Build
        run: uv sync

      - name: Audit .pth files
        run: |
          ALLOWED="_virtualenv.pth|distutils-precedence.pth|nagi_cli.pth"
          FOUND=0
          find .venv -name "*.pth" | grep -vE "$ALLOWED" | while read -r f; do
            if grep -q "^import" "$f"; then
              BASENAME=$(basename "$f")
              PKG=$(grep -rl "$BASENAME" .venv/lib/python*/site-packages/*.dist-info/RECORD 2>/dev/null \
                | head -1 | xargs -I{} dirname {} | xargs -I{} basename {} | sed 's/\.dist-info$//' || echo "unknown")
              echo "::error::Suspicious .pth file installed by $PKG: $f"
              grep "^import" "$f" | while read -r line; do
                echo "  $line"
              done
              FOUND=1
            fi
          done
          if [ "$FOUND" = "1" ]; then exit 1; fi

      - name: Audit Python dependencies
        if: github.event_name == 'pull_request'
        run: |
          uv export --frozen --no-emit-project > requirements.txt
          RESULT=$(uvx pip-audit -r requirements.txt 2>&1) && AUDIT_RC=0 || AUDIT_RC=$?
          # Minimize previous pip-audit comments
          gh api "repos/${{ github.repository }}/issues/${{ github.event.number }}/comments" \
            --jq '.[] | select(.body | startswith("## pip-audit")) | .id' \
            | xargs -I{} gh api -X PATCH "repos/${{ github.repository }}/issues/comments/{}" \
              -f body="## pip-audit (outdated)" 2>/dev/null || true
          if [ "$AUDIT_RC" -ne 0 ]; then
            gh pr comment ${{ github.event.number }} --body "$(cat <<EOF
          ## pip-audit
          \`\`\`
          $RESULT
          \`\`\`
          EOF
          )"
          fi
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Type check
        run: uv run ty check python/

      - name: Unit test
        run: uv run pytest python/tests/ -v -m "not integration and not scenario" -n auto

      - name: Setup dbt project
        working-directory: python/tests/dbt_project
        run: |
          uv run dbt seed --profiles-dir profiles
          uv run dbt compile --profiles-dir profiles

      - name: Integration test
        run: uv run pytest python/tests/integration/ -v -m integration

      - name: Scenario test
        run: uv run pytest python/tests/scenario/ -v -m scenario

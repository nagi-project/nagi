name: Setup Rust
description: Install Rust toolchain and configure cargo cache

inputs:
  components:
    description: Rust toolchain components to install (e.g. "clippy, rustfmt")
    required: false
    default: ""
  cache-prefix:
    description: Cache key prefix for Swatinem/rust-cache
    required: true

runs:
  using: composite
  steps:
    - uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 # v1
      with:
        toolchain: stable
        components: ${{ inputs.components }}

    - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      with:
        prefix-key: ${{ inputs.cache-prefix }}

    - name: Disable incremental compilation
      shell: bash
      run: echo "CARGO_INCREMENTAL=0" >> "$GITHUB_ENV"

name: Setup Rust
description: Install Rust toolchain and configure cargo cache

inputs:
  components:
    description: Rust toolchain components to install (e.g. "clippy, rustfmt")
    required: false
    default: ""
  cache-prefix:
    description: Cache key prefix for cargo cache
    required: true

runs:
  using: composite
  steps:
    - uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 # v1
      with:
        toolchain: stable
        components: ${{ inputs.components }}

    - uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
      with:
        path: |
          ~/.cargo/bin
          ~/.cargo/registry
          ~/.cargo/git
          target
        key: ${{ inputs.cache-prefix }}-${{ runner.os }}-${{ hashFiles('**/Cargo.lock', 'crates/**/*.rs') }}
        restore-keys: ${{ inputs.cache-prefix }}-${{ runner.os }}-

name: Setup DuckDB CLI
description: Install DuckDB CLI binary

runs:
  using: composite
  steps:
    - name: Install DuckDB CLI (Linux/macOS)
      if: runner.os != 'Windows'
      shell: bash
      run: |
        VERSION=$(grep '^duckdb = ' mise.toml | sed 's/.*= *"\(.*\)"/\1/')
        curl https://install.duckdb.org | DUCKDB_VERSION="$VERSION" sh

    - name: Install DuckDB CLI (Windows)
      if: runner.os == 'Windows'
      shell: pwsh
      run: |
        $version = (Select-String -Path mise.toml -Pattern '^duckdb = "(.*)"').Matches.Groups[1].Value
        $url = "https://github.com/duckdb/duckdb/releases/download/v${version}/duckdb_cli-windows-amd64.zip"
        Invoke-WebRequest -Uri $url -OutFile duckdb.zip
        Expand-Archive duckdb.zip -DestinationPath duckdb-bin
        $dest = Join-Path $env:RUNNER_TEMP "duckdb-bin"
        New-Item -ItemType Directory -Force -Path $dest | Out-Null
        Move-Item duckdb-bin\duckdb.exe $dest\duckdb.exe
        echo $dest >> $env:GITHUB_PATH
        Remove-Item duckdb.zip, duckdb-bin -Recurse -Force

name: Setup DuckDB CLI
description: Install DuckDB CLI binary

runs:
  using: composite
  steps:
    - name: Install DuckDB CLI
      shell: bash
      run: |
        VERSION=$(grep '^duckdb' mise.toml | sed 's/.*= *"\(.*\)"/\1/')
        curl -fsSL "https://github.com/duckdb/duckdb/releases/download/v${VERSION}/duckdb_cli-linux-amd64.zip" -o duckdb.zip
        unzip duckdb.zip
        sudo mv duckdb /usr/local/bin/
        rm duckdb.zip

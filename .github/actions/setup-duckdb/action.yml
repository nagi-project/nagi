name: Setup DuckDB CLI
description: Install DuckDB CLI binary

inputs:
  version:
    description: DuckDB version to install
    required: false
    default: "1.5.1"

runs:
  using: composite
  steps:
    - name: Install DuckDB CLI
      shell: bash
      run: |
        curl -fsSL "https://github.com/duckdb/duckdb/releases/download/v${{ inputs.version }}/duckdb_cli-linux-amd64.zip" -o duckdb.zip
        unzip duckdb.zip
        sudo mv duckdb /usr/local/bin/
        rm duckdb.zip

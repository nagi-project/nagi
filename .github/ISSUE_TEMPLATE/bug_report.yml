name: Bug Report
description: Report a bug
labels: ["bug"]
title: "bug: "
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What happened?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: Minimal steps to reproduce the issue.
      placeholder: |
        1. Run `nagi compile`
        2. Run `nagi evaluate`
        3. See error
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What did you expect to happen?
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: OS, Python version, nagi version.
      placeholder: |
        - OS: macOS 15.4
        - Python: 3.12.0
        - nagi: 0.0.1
    validations:
      required: true

INHERIT: mkdocs.yml

site_name: Nagi Documentation
site_url: !ENV [SITE_URL_JA, 'https://nagi-project.dev/ja/']
edit_uri: edit/main/docs/ja/
docs_dir: !ENV [DOCS_DIR_JA, docs/ja]
site_dir: site/ja

theme:
  language: ja

extra:
  version:
    provider: mike
  alternate:
    - name: English
      link: !ENV [DOCS_LINK_EN, '/']
      lang: en
    - name: 日本語
      link: !ENV [DOCS_LINK_JA, '/ja/']
      lang: ja

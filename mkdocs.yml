site_name: Nagi Documentation
site_url: https://nagi-project.github.io/nagi/
repo_url: https://github.com/nagi-project/nagi
repo_name: nagi-project/nagi
edit_uri: edit/main/docs/

theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.sections
    - navigation.expand
    - navigation.indexes
    - content.code.copy

extra_css:
  - stylesheets/extra.css

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - def_list
  - attr_list

nav:
  - Introduction: index.md
  - Overview:
    - Concepts: overview/concepts.md
    - Quickstart: overview/quickstart.md
    - Get Started: overview/get-started.md
  - Architecture:
    - architecture/index.md
    - Serve:
      - Internals: architecture/serve/internals.md
      - Scenarios: architecture/serve/scenarios.md
      - Restart: architecture/serve/restart.md
    - Storage: architecture/storage.md
    - Export: architecture/export.md
    - Notifications: architecture/notifications.md
    - MCP Server: architecture/mcp.md
  - Operations:
    - Deployment:
      - operations/deployment/index.md
      - Local: operations/deployment/local.md
      - VM: operations/deployment/vm.md
      - Container: operations/deployment/container.md
  - Reference:
    - Project Config: reference/project.md
    - Resource Config:
      - reference/resources/index.md
      - "kind: Asset": reference/resources/asset.md
      - "kind: Connection": reference/resources/connection.md
      - "kind: Sync": reference/resources/sync.md
      - "kind: Conditions": reference/resources/conditions.md
      - "kind: Origin": reference/resources/origin.md
    - CLI: reference/cli.md
    - Glossary: reference/glossary.md
  - Integrations:
    - integrations/index.md
    - dbt:
      - Resource Generation: integrations/dbt/resource-generation.md
      - dbt Core: integrations/dbt/core.md
      - dbt Cloud: integrations/dbt/cloud.md
